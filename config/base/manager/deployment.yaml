apiVersion: apps/v1
kind: Deployment
metadata:
  name: amberflo-provider
  labels:
    control-plane: amberflo-provider
    app.kubernetes.io/name: amberflo-provider
    app.kubernetes.io/managed-by: kustomize
spec:
  selector:
    matchLabels:
      control-plane: amberflo-provider
  replicas: 1
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/default-container: manager
      labels:
        control-plane: amberflo-provider
        app.kubernetes.io/name: amberflo-provider
    spec:
      securityContext:
        runAsNonRoot: true
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              podAffinityTerm:
                topologyKey: kubernetes.io/hostname
                labelSelector:
                  matchLabels:
                    control-plane: amberflo-provider
      containers:
        - command:
            - /amberflo-provider
          args:
            - --leader-elect
            - --leader-elect-namespace=kube-system
            - --health-probe-bind-address=:8081
            - --server-config=/config/config.yaml
          image: ghcr.io/milo-os/amberflo-provider:dev
          name: manager
          ports:
            - containerPort: 8080
              name: metrics
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - "ALL"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            limits:
              cpu: 500m
              memory: 128Mi
            requests:
              cpu: 10m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /config
      serviceAccountName: amberflo-provider
      terminationGracePeriodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: amberflo-provider-config
