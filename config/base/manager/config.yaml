apiVersion: config.amberflo.providers.datum.net/v1alpha1
kind: AmberfloProvider
metricsServer:
  bindAddress: "0"
amberfloBaseURL: https://app.amberflo.io
amberfloAPIKeyPath: /var/run/secrets/amberflo/api-key
amberfloRateLimitPerSec: 10
allowCustomerDelete: false
natsConfig:
  url: "tls://nats.nats-system.svc.cluster.local:4222"
  caFile: "/etc/nats-certs/ca.crt"
  certFile: "/etc/nats-certs/tls.crt"
  keyFile: "/etc/nats-certs/tls.key"
