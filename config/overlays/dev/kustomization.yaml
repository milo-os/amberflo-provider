apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: amberflo-provider-system

resources:
  - namespace.yaml
  - ../../base/manager

components:
  - ../../components/leader_election

configMapGenerator:
  - name: amberflo-provider-config
    behavior: replace
    files:
      - config.yaml
    options:
      disableNameSuffixHash: true

patches:
  - target:
      kind: Deployment
      name: amberflo-provider
    path: deployment_patch.yaml
  # We use JSON patches for volume removal because Strategic Merge Patches
  # can sometimes clear the entire volumeMounts list instead of just deleting
  # the targeted item. These surgical removals ensure the nats-certs (index 1)
  # are removed while keeping the critical /config and webhook certs (if any).
  - target:
      kind: Deployment
      name: amberflo-provider
    patch: |-
      - op: remove
        path: /spec/template/spec/containers/0/volumeMounts/1
      - op: remove
        path: /spec/template/spec/volumes/1
