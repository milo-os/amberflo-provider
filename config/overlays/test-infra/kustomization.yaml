apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# test-infra overlay is the variant applied by `task test:deploy` in the
# M4 e2e harness. It:
#   * Pins the controller image to :dev (the tag loaded into kind by
#     `task dev:load`).
#   * Points the provider at the Amberflo sandbox (https://app.amberflo.io).
#   * Mounts the amberflo-credentials Secret created by
#     `task test:create-amberflo-credentials` (from AMBERFLO_API_KEY).
#   * Enables leader election (kube-system lease).

namespace: amberflo-provider-system

resources:
  - namespace.yaml
  - ../../base/manager

components:
  - ../../components/controller_rbac
  - ../../components/leader_election
  - ../../components/amberflo-credentials

images:
  - name: ghcr.io/milo-os/amberflo-provider
    newTag: dev

generatorOptions:
  disableNameSuffixHash: true

configMapGenerator:
  - name: amberflo-provider-config
    behavior: replace
    files:
      - config.yaml=config.yaml

patches:
  - target:
      kind: Deployment
      name: amberflo-provider
    path: deployment_patch.yaml
