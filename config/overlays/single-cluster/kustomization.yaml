apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# single-cluster overlay is intended for downstream consumers that want
# to deploy amberflo-provider into the same cluster that hosts the Milo
# API server. It produces a minimal runnable bundle: namespace, CRD,
# manager Deployment, leader-election RBAC. Consumers layer the
# amberflo-credentials and (optionally) milo-integration components on
# top via their own kustomization.yaml.
namespace: amberflo-provider-system

resources:
  - namespace.yaml
  - ../../base/manager
  - ../../base/submission-consumer

components:
  - ../../components/leader_election
