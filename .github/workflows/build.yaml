name: build

on:
  push:
  release:
    types: ["published"]

jobs:
  validate-kustomize:
    uses: datum-cloud/actions/.github/workflows/validate-kustomize.yaml@v1.14.0

  publish-container-image:
    needs:
      - validate-kustomize
    permissions:
      id-token: write
      contents: read
      packages: write
      attestations: write
    uses: datum-cloud/actions/.github/workflows/publish-docker.yaml@v1.14.0
    with:
      image-name: amberflo-provider
      registry-organization: milo-os
      platforms: linux/amd64,linux/arm64
    secrets: inherit

  publish-kustomize-bundle:
    needs:
      - validate-kustomize
      - publish-container-image
    permissions:
      id-token: write
      contents: read
      packages: write
    uses: datum-cloud/actions/.github/workflows/publish-kustomize-bundle.yaml@v1.14.0
    with:
      bundle-name: ghcr.io/milo-os/amberflo-provider-kustomize
      bundle-path: config
      image-overlays: config/base/manager
      image-name: ghcr.io/milo-os/amberflo-provider
    secrets: inherit
